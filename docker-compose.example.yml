services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: smartwatch-postgres
    environment:
      POSTGRES_DB: smartwatch_admin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smartwatch-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Node.js (TCP + API + WebSocket)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartwatch-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Base de datos
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: smartwatch_admin
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}

      # APIs de Geolocalización
      GOOGLE_GEOLOCATION_API_KEY: ${GOOGLE_GEOLOCATION_API_KEY}
      UNWIRED_LABS_TOKEN: ${UNWIRED_LABS_TOKEN}
      OPENCELLID_API_TOKEN: ${OPENCELLID_API_TOKEN}

      # Servidores
      TCP_SERVER_HOST: 0.0.0.0
      TCP_SERVER_PORT: 7070
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: 3001
      WEBSOCKET_PORT: 3001

      # JWT
      JWT_SECRET: ${JWT_SECRET}

      # CORS - Frontend URL
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}

      # IP del servidor para comandos a dispositivos
      SERVER_IP: ${SERVER_IP:-localhost}

      # Otros
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "7070:7070"
      - "28000:3001"
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - smartwatch-network
    restart: unless-stopped

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_WS_URL: ""
    container_name: smartwatch-frontend
    depends_on:
      - backend
    ports:
      - "23000:3000"
    networks:
      - smartwatch-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  smartwatch-network:
    driver: bridge
