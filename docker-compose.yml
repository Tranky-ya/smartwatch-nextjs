services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: smartwatch-postgres
    environment:
      POSTGRES_DB: smartwatch_admin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Barcelona537
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smartwatch-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Node.js (TCP + API + WebSocket)
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartwatch-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Base de datos
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: smartwatch_admin
      DB_USER: postgres
      DB_PASSWORD: Barcelona537

      # APIs de Geolocalización (AGREGAR ESTAS)
      GOOGLE_GEOLOCATION_API_KEY: AIzaSyBMrnhI98PXPI3lVI-bFI8jz-ZyEmA24Yg
      UNWIRED_LABS_TOKEN: pk.3375aa06d89d8fc11116edf2f2ff52ea
      OPENCELLID_API_TOKEN: pk.e71689991f177c30448dd2841bd0d984
      
      # Servidores
      TCP_SERVER_HOST: 0.0.0.0
      TCP_SERVER_PORT: 7070
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: 3001
      WEBSOCKET_PORT: 3001
      
      # JWT
      JWT_SECRET: Barcelona537_Colombia_Bellomonte75
      
      # CORS - Frontend URL
      FRONTEND_URL: https://fulltranki.com
      
      # IP del servidor para comandos a dispositivos
      SERVER_IP: fulltranki.com
      
      # Otros
      NODE_ENV: production
      LOG_LEVEL: info
    ports:
      - "7070:7070"
      - "3003:3001"
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - smartwatch-network
    restart: unless-stopped

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://fulltranki.com
        NEXT_PUBLIC_WS_URL: https://fulltranki.com
    container_name: smartwatch-frontend
    depends_on:
      - backend
    ports:
      - "3002:3000"
    networks:
      - smartwatch-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  smartwatch-network:
    driver: bridge
